        .post {
            background:white; padding:20px; border-radius:10px;
            flex:1 1 300px;
            box-shadow:0 2px 6px rgba(0,0,0,0.1);
            transition:0.3s;
        }
        .post:hover {
            transform:translateY(-5px);
        }
        .post a {
            background:#222; color:white; padding:10px 15px;
            text-decoration:none; border-radius:5px;
        }
        .ad {
            background:#ddd; text-align:center; padding:20px;
            margin:20px 0; border-radius:10px;
        }
        @media(max-width:600px){

<script>
function searchPosts(){
    let input = document.getElementById("search").value.toLowerCase();
    let posts = document.getElementsByClassName("post");

    for(let i=0;i<posts.length;i++){
        let title = posts[i].getElementsByTagName("h2")[0].innerText.toLowerCase();
        posts[i].style.display = title.includes(input) ? "block" : "none";
    }
}
</script>
