<!DOCTYPE html>
<html lang="en">
<head>
    <title>Age Calculator - FixAndLearn</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
        }
        header, footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }
        nav {
            background: #555;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }
        .container {
            max-width: 500px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }
        input {
            padding: 10px;
            width: 80%;
            margin: 10px 0;
        }
        button {
            padding: 10px 15px;
            background: #333;
            color: white;
            border: none;
            cursor: pointer;
        }
        #result {
            margin-top: 15px;
            font-size: 18px;
            color: green;
        }
    </style>
</head>
<body>

<header>
    <h1>FixAndLearn</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="blog.html">Blog</a>
    <a href="age.html">Age Calculator</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">
    <h2>Age Calculator</h2>

    <p>Select your birth date:</p>
    <input type="date" id="dob">

    <br>
    <button onclick="calculateAge()">Calculate Age</button>

    <div id="result"></div>
</div>

<footer>
    <p>© 2026 FixAndLearn</p>
</footer>

<script>
function calculateAge() {
    let dob = document.getElementById("dob").value;
    let result = document.getElementById("result");

    if (!dob) {
        result.innerHTML = "Please select your birth date!";
        return;
    }

    let birthDate = new Date(dob);
    let today = new Date();

    let age = today.getFullYear() - birthDate.getFullYear();
    let month = today.getMonth() - birthDate.getMonth();

    if (month < 0 || (month === 0 && today.getDate() < birthDate.getDate())) {
        age--;
    }

    result.innerHTML = "Your Age is: " + age + " years";
}
</script>

</body>
</html>
