<!DOCTYPE html>
<html lang="en">
<head>
    <title>Age Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { font-family: Arial; margin:0; background:#f4f6f8; text-align:center; }
        header, footer { background:#222; color:white; padding:15px; }
        .box { max-width:400px; margin:auto; background:white; padding:20px; border-radius:10px; }
        input, button { padding:10px; margin:10px; width:80%; }
        button { background:#222; color:white; border:none; }
    </style>
</head>
<body>

<header><h1>Age Calculator</h1></header>

<div class="box">
    <input type="date" id="dob">
    <button onclick="calc()">Calculate</button>
    <h2 id="result"></h2>
</div>

<footer>© 2026 FixAndLearn</footer>

<script>
function calc(){
    let dob = document.getElementById("dob").value;
    if(!dob){ alert("Select date"); return; }

    let birth = new Date(dob);
    let today = new Date();
    let age = today.getFullYear() - birth.getFullYear();

    document.getElementById("result").innerText = "Your Age: " + age;
}
</script>

</body>
</html>
